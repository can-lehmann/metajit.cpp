name: test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write

    steps:
      - name: Checkout metajit.cpp
        uses: actions/checkout@v6
        with:
          path: metajit.cpp
      - name: Checkout unittest.cpp
        uses: actions/checkout@v6
        with:
          path: unittest.cpp
          repository: can-lehmann/unittest.cpp
      - name: Checkout lwir.cpp
        uses: actions/checkout@v6
        with:
          path: lwir.cpp
          repository: can-lehmann/lwir.cpp
      - name: Set up LLVM
        run: |
          # See https://apt.llvm.org/
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev llvm-20-tools
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 200
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-20 200
      - name: Set up Z3
        run: |
          wget https://github.com/Z3Prover/z3/releases/download/z3-4.16.0/z3-4.16.0-x64-glibc-2.39.zip
          unzip z3-4.16.0-x64-glibc-2.39.zip
          mv z3-4.16.0-x64-glibc-2.39 z3build
      - name: Build and run tests
        working-directory: metajit.cpp
        run: |
          make clean
          make test
      - name: Fuzz a bit
        working-directory: metajit.cpp
        run: |
          make tests/fuzzer Z3_FLAGS="-I../z3build/include -L../z3build/bin -lz3 -Wl,-rpath,$(pwd)/../z3build/bin"
          tests/fuzzer --number-of-runs=100
      - name: Fuzz generating extensions
        working-directory: metajit.cpp
        run: |
          tests/fuzzer --mode=trace --number-of-runs=50
      - name: Fuzz translation validation
        working-directory: metajit.cpp
        run: |
          tests/fuzzer --mode=tv --number-of-runs=50
      - name: Coverage report
        if: github.event_name == 'pull_request'
        working-directory: metajit.cpp
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          make -j coverage
          make coverage-report > coverage.txt
          gh pr comment ${{ github.event.pull_request.number }} --body "$(printf '### Coverage\n```\n'; cat coverage.txt; printf '```')"
      - name: Upload coverage report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: metajit.cpp/tests/coverage/report.html
